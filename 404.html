<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada | Pedro Vitor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23faf9f7' stroke='%23c96f4a' stroke-width='3'/%3E%3Ctext x='50' y='58' text-anchor='middle' font-family='Arial,sans-serif' font-weight='700' font-size='36' fill='%23c96f4a'%3EPV%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --text: #1c1c1e;
      --muted: #686765;
      --accent-start: #c96f4a;
      --accent-end: #a34e2b;
      --btn-bg: #1c1c1e;
      --btn-color: #faf9f7;
      --btn-hover: #000;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1c;
        --text: #f0f0f0;
        --muted: #9b9a97;
        --accent-start: #d4815e;
        --accent-end: #b35d3a;
        --btn-bg: #f0f0f0;
        --btn-color: #1a1a1c;
        --btn-hover: #ffffff;
      }
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 480px;
    }
    .error-code {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin: 16px 0 12px;
    }
    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--btn-bg);
      color: var(--btn-color);
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .back-btn:hover {
      background: var(--btn-hover);
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Página não encontrada</h1>
    <p>O conteúdo que você procura não existe ou foi movido. Mas meu portfólio está bem aqui embaixo.</p>
    <a class="back-btn" href="/">← Voltar ao Portfólio</a>
  </div>
</body>
</html>
